<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deltra Alvaurit - Portofolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Reset dasar */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: #f9f9f9;
      color: #333;
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* Container utama */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    /* Header / Nama & Posisi */
    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #222;
      margin-bottom: 0.5rem;
    }

    header p {
      font-size: 1.2rem;
      color: #555;
      margin-bottom: 1.5rem;
    }

    /* Tagline */
    .tagline {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      max-width: 600px;
      color: #666;
    }

    /* CTA Button */
    .cta {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      margin: 0.5rem;
      background-color: #ff8c42;
      color: #fff;
      font-weight: 600;
      border-radius: 8px;
      transition: transform 0.3s ease, background-color 0.3s ease;
    }

    .cta:hover {
      transform: translateY(-3px);
      background-color: #e07b33;
    }

    /* Foto / Ilustrasi */
    .profile-pic {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      margin-top: 2rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    .profile-pic:hover {
      transform: scale(1.05);
    }

    /* Footer */
    footer {
      margin-top: 4rem;
      padding: 1rem;
      border-top: 1px solid #ddd;
      width: 100%;
      text-align: center;
      font-size: 0.9rem;
      color: #555;
    }

    footer a {
      color: #ff8c42;
      transition: color 0.3s ease;
    }

    footer a:hover {
      color: #e07b33;
    }

    /* Responsif */
    @media (max-width: 768px) {
      header h1 {
        font-size: 2rem;
      }

      header p {
        font-size: 1rem;
      }

      .cta {
        padding: 0.6rem 1.2rem;
      }

      .profile-pic {
        width: 140px;
        height: 140px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Deltra Alvaurit</h1>
      <p>Freelancer / Web Designer / Developer</p>
    </header>

    <p class="tagline">Menciptakan solusi digital yang elegan dan efisien untuk membantu bisnis dan individu menonjol di dunia online.</p>

    <div class="cta-buttons">
      <a href="#portfolio" class="cta">Lihat Portofolio</a>
      <a href="tel:083152138007" class="cta">Hubungi Saya</a>
    </div>

    <img src="https://via.placeholder.com/180" alt="Foto Deltra Alvaurit" class="profile-pic">

  </div>

  <footer>
    <p>📞 083152138007 | <a href="https://www.facebook.com/deltra.alvaurit" target="_blank">Facebook Deltra Alvaurit</a></p>
  </footer>

</body>
</html>
